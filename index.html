<!doctype html>
<html lang="kk" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Basic Meta Tags -->
    <title>🔔 Берік & Гүлжауһардың тойы 🔔</title>
    <meta
      name="description"
      content="Берік & Гүлжауһардың той салтанаты. Сізді қуанышқа шақырамыз!"
    />

    <!-- Open Graph for WhatsApp/Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="🔔 Берік & Гүлжауһардың тойы 🔔" />
    <meta
      property="og:description"
      content="Берік & Гүлжауһардың той салтанаты. Сізді қуанышқа шақырамыз!"
    />
    <meta property="og:url" content="https://toygashahiru.vercel.app/" />
    <meta
      property="og:image"
      content="https://images.unsplash.com/photo-1519741497674-611481863552?w=1200&h=630&fit=crop&crop=center"
    />
    <meta property="og:image:type" content="image/jpeg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Той шақыруы" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="🔔 Берік & Гүлжауһардың тойы 🔔" />
    <meta
      name="twitter:description"
      content="Берік & Гүлжауһардың той салтанаты. Сізді қуанышқа шақырамыз!"
    />
    <meta
      name="twitter:image"
      content="https://images.unsplash.com/photo-1519741497674-611481863552?w=1200&h=630&fit=crop&crop=center"
    />

    <!-- Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&display=swap"
      rel="stylesheet"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Playfair Display", serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        color: white;
        text-align: center;
      }

      .container {
        max-width: 600px;
        padding: 40px;
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(10px);
        border-radius: 20px;
        box-shadow: 0 8px 32px rgba(31, 38, 135, 0.37);
        border: 1px solid rgba(255, 255, 255, 0.18);
      }

      .title {
        font-size: 2.5rem;
        font-weight: 700;
        margin-bottom: 20px;
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
      }

      .names {
        font-size: 3rem;
        font-weight: 600;
        margin: 30px 0;
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
      }

      .description {
        font-size: 1.2rem;
        margin: 20px 0;
        line-height: 1.6;
      }

      .decoration {
        font-size: 2rem;
        margin: 20px 0;
        opacity: 0.8;
      }

      @media (max-width: 768px) {
        .container {
          margin: 20px;
          padding: 30px 20px;
        }

        .title {
          font-size: 2rem;
        }

        .names {
          font-size: 2.2rem;
        }
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="decoration">🔔 ✨ 🔔</div>
      <h1 class="title">Тойға Шақыру</h1>
      <h2 class="names">Берік & Гүлжауһар</h2>
      <p class="description">
        Біздің той салтанатымызға<br />
        Сізді қуанышпен шақырамыз!<br /><br />
        Бізбен бірге болып,<br />
        ерекше күнімізді бөлісіңіз!
      </p>
      <div class="decoration">💍 🎉 💕</div>
    </div>

    <!-- React app will load here if needed -->
    <div id="root" style="display: none"></div>
    <script type="module" src="/src/main.jsx"></script>

    <script>
      // Show loading message
      console.log("Wedding invitation loaded successfully!");

      // Simple analytics
      if (navigator.share) {
        console.log("Native sharing is supported");
      }
    </script>
  </body>
</html>
